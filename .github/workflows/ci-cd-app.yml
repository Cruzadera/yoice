name: CI/CD App

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'data/**'
      - '.github/workflows/ci-cd-app.yml'
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/votia-app-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/votia-app-frontend

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'data/**'
            frontend:
              - 'frontend/**'

  build-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=prod,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=prod,enable={{is_default_branch}}

      - name: Resolve frontend API URL
        id: frontend_api
        env:
          SECRET_EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          if [ -n "$SECRET_EXPO_PUBLIC_API_URL" ]; then
            echo "value=$SECRET_EXPO_PUBLIC_API_URL" >> "$GITHUB_OUTPUT"
            echo "Using EXPO_PUBLIC_API_URL from GitHub Secrets."
          else
            echo "value=https://votia.duckdns.org/api" >> "$GITHUB_OUTPUT"
            echo "EXPO_PUBLIC_API_URL not configured; using fallback https://votia.duckdns.org/api"
          fi

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            EXPO_PUBLIC_API_URL=${{ steps.frontend_api.outputs.value }}
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Skip deploy when SSH is not configured
        if: ${{ secrets.DEPLOY_HOST == '' || secrets.DEPLOY_USER == '' || secrets.DEPLOY_SSH_KEY == '' }}
        run: |
          echo "SSH secrets are not configured. Images have been published only."

      - name: Deploy backend over SSH
        if: ${{ (needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' }}
        id: deploy_backend
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          timeout: 20s
          command_timeout: 10m
          script: |
            export COMPOSE_PATH="/opt/home-server/votia/docker-compose.yml"
            export ENV_PATH="/opt/home-server/votia/.env"
            /opt/home-server/votia/scripts/deploy-service.sh votia-app

      - name: Deploy frontend over SSH
        if: ${{ (needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' }}
        id: deploy_frontend
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          timeout: 20s
          command_timeout: 10m
          script: |
            export COMPOSE_PATH="/opt/home-server/votia/docker-compose.yml"
            export ENV_PATH="/opt/home-server/votia/.env"
            /opt/home-server/votia/scripts/deploy-service.sh votia-web

      - name: Report deferred deploy
        if: ${{ (steps.deploy_backend.outcome == 'failure') || (steps.deploy_frontend.outcome == 'failure') }}
        run: |
          echo "Remote host appears offline or unreachable for one or more services."
          echo "Deploy deferred until mini PC boot script reconciles services."

      - name: Report successful deploy
        if: ${{ (steps.deploy_backend.outcome == 'success' || steps.deploy_backend.outcome == '') && (steps.deploy_frontend.outcome == 'success' || steps.deploy_frontend.outcome == '') }}
        run: |
          echo "Selective app deploy completed."
